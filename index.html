<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>
<script src="chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding: 16px; }
h1 { font-size: 1.4rem; color: #4ecdc4; margin-bottom: 4px; }
.updated { font-size: 0.75rem; color: #888; margin-bottom: 16px; }
.stock-card { background: #1a1a2e; border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid #2d2d44; }
.stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.stock-name { font-size: 1.1rem; font-weight: 600; color: #fff; }
.stock-price { font-size: 1.3rem; font-weight: 700; color: #4ecdc4; }
.signal { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-top: 8px; margin-right: 8px; }
.signal.buy { background: #1b4332; color: #26de81; }
.signal.sell { background: #4a1515; color: #fc5c65; }
.signal.hold { background: #3d3520; color: #ffd93d; }
.signal.caution { background: #4a3015; color: #f9ca24; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
.indicator { background: #252540; border-radius: 10px; padding: 8px; text-align: center; }
.indicator-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.indicator-value { font-size: 0.95rem; font-weight: 600; margin-top: 2px; }
.indicator-value.red { color: #fc5c65; }
.indicator-value.green { color: #26de81; }
.indicator-value.yellow { color: #ffd93d; }
.conclusion { background: #252540; border-radius: 10px; padding: 10px 12px; font-size: 0.78rem; line-height: 1.5; color: #ccc; margin-top: 10px; }
.chart-wrap { margin-top: 12px; background: #15152a; border-radius: 10px; padding: 8px; }
.ma-row { display: flex; gap: 6px; font-size: 0.75rem; margin-top: 4px; flex-wrap: wrap; }
.ma-tag { background: #252540; padding: 2px 8px; border-radius: 6px; }
.ma-tag.up { color: #26de81; }
.ma-tag.down { color: #fc5c65; }
.footer { text-align: center; padding: 20px; font-size: 0.7rem; color: #555; }
#lock-screen { position: fixed; inset: 0; z-index: 9999; background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
#lock-screen.hidden { opacity: 0; pointer-events: none; }
#lock-screen h2 { color: #4ecdc4; font-size: 1.5rem; margin-bottom: 16px; }
#lock-input { background: #1a1a2e; border: 1px solid #4ecdc4; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 1rem; text-align: center; width: 260px; outline: none; }
#lock-input:focus { border-color: #26de81; }
#lock-msg { color: #fc5c65; font-size: 0.8rem; margin-top: 10px; display: none; }
#lock-screen button { margin-top: 12px; padding: 10px 30px; background: #4ecdc4; color: #0f0f1a; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600; }
</style>
</head>
<div id="lock-screen">
  <h2>🔐 Stock Dashboard</h2>
  <input type="password" id="lock-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPwd()">
  <button onclick="checkPwd()">解鎖</button>
  <p id="lock-msg">密碼錯誤，請再試一次</p>
</div>
<script>
const PWD = 'Frank2026';
function checkPwd(){
  var v = document.getElementById('lock-input').value;
  if(v === PWD){
    document.getElementById('lock-screen').classList.add('hidden');
    setTimeout(function(){ document.getElementById('lock-screen').style.display='none'; }, 500);
  } else {
    document.getElementById('lock-msg').style.display='block';
    document.getElementById('lock-input').value='';
  }
}
</script>
<body>
<h1>📊 Stock Dashboard</h1>
<p class="updated">Updated: <span id="updated-time"></span></p>
<div id="stocks"></div>
<div class="footer">Automated Technical Analysis • MA + KD + RSI + MACD + Volume + Bollinger</div>
<script src="data.js"></script>
<script>
document.getElementById('updated-time').textContent = generatedAt;

const signalLabel = { buy: "🟢 短線偏多", sell: "🔴 短線減碼", caution: "🟡 謹慎持有", hold: "⚪ 觀望" };
const signalClass = { buy: "buy", sell: "sell", caution: "caution", hold: "hold" };

const chartInstances = {};

function drawChart(stock) {
  var container = document.getElementById('chart-' + stock.code);
  if (!container) return;

  // destroy old chart if exists
  if (chartInstances[stock.code]) {
    chartInstances[stock.code].destroy();
    container.innerHTML = '';
  }

  var isMobile = window.innerWidth < 500;
  var chartH = isMobile ? 260 : 320;

  // Helper: convert hex to rgba
  function hex2rgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  var priceColor = '#4ecdc4';
  var ma5Color = '#f9ca24';
  var ma10Color = '#f0932b';
  var bbColor = '#ffd93d';
  var upColor = '#fc5c65';
  var dnColor = '#26de81';

  var priceDates = stock.dates;
  var closes = stock.closes;

  // --- Chart 1: Price + MA + Bollinger ---
  var pCtx = document.getElementById('chart-price-' + stock.code);
  new Chart(pCtx, {
    type: 'line',
    data: {
      labels: priceDates,
      datasets: [
        { label: 'Price', data: closes, borderColor: priceColor, backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.2, pointRadius: 0 },
        { label: 'MA5', data: stock.closes.map(function(c,i){return i < stock.closes.length - 5 ? null : stock.closes[i];}), borderColor: ma5Color, backgroundColor: 'transparent', borderWidth: 1, tension: 0.2, pointRadius: 0 },
        { label: 'BB Upper', data: stock.bb_upper, borderColor: hex2rgba(upColor, 0.5), backgroundColor: 'transparent', borderWidth: 0.8, borderDash: [4,4], pointRadius: 0, fill: false },
        { label: 'BB Mid', data: stock.bb_mid, borderColor: bbColor, backgroundColor: 'transparent', borderWidth: 0.8, borderDash: [4,4], pointRadius: 0, fill: false },
        { label: 'BB Lower', data: stock.bb_lower, borderColor: hex2rgba(dnColor, 0.5), backgroundColor: hex2rgba(dnColor, 0.05), borderWidth: 0.8, borderDash: [4,4], pointRadius: 0, fill: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      height: chartH * 0.55,
      scales: { x: { ticks: { color:'#888', maxTicksLimit: 8, maxRotation: 0, font:{size:9} }, grid:{color:'rgba(255,255,255,0.05)'} }, y: { ticks:{color:'#888',font:{size:9}}, grid:{color:'rgba(255,255,255,0.05)'} } },
      plugins: { legend: { display: false }, tooltip: { mode:'index', intersect:false } }
    }
  });

  // --- Chart 2: Volume ---
  var vCtx = document.getElementById('chart-vol-' + stock.code);
  var volColors = [];
  for (var i = 1; i < stock.closes.length; i++) {
    volColors.push(stock.closes[i] >= stock.closes[i-1] ? hex2rgba(dnColor, 0.7) : hex2rgba(upColor, 0.7));
  }
  new Chart(vCtx, {
    type: 'bar',
    data: {
      labels: priceDates.slice(1),
      datasets: [{ data: stock.volumes.slice(1), backgroundColor: volColors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      height: chartH * 0.22,
      scales: { x: { ticks: { color:'#888', maxTicksLimit: 8, maxRotation: 0, font:{size:9} }, grid:{display:false} }, y: { ticks:{display:false}, grid:{display:false} } },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });

  // --- Chart 3: RSI ---
  var rCtx = document.getElementById('chart-rsi-' + stock.code);
  var rsiColor = stock.rsi > 70 ? upColor : stock.rsi < 30 ? dnColor : '#ffd93d';
  new Chart(rCtx, {
    type: 'line',
    data: {
      labels: stock.rsi_dates,
      datasets: [
        { label: 'RSI', data: stock.rsi_vals, borderColor: rsiColor, backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, pointRadius: 0, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      height: chartH * 0.22,
      scales: { x: { ticks: { color:'#888', maxTicksLimit: 8, maxRotation: 0, font:{size:9} }, grid:{display:false} }, y: { min:0, max:100, ticks:{color:'#888',font:{size:9},stepSize:20}, grid:{color:'rgba(255,255,255,0.05)'} } },
      plugins: { legend: { display: false }, tooltip: { enabled: true } }
    }
  });

  // --- Chart 4: MACD ---
  var mCtx = document.getElementById('chart-macd-' + stock.code);
  var histColors = stock.hist.map(function(h){ return h >= 0 ? hex2rgba(dnColor, 0.6) : hex2rgba(upColor, 0.6); });
  new Chart(mCtx, {
    type: 'bar',
    data: {
      labels: priceDates,
      datasets: [
        { label: 'MACD', data: stock.macd_line, borderColor: priceColor, backgroundColor: 'transparent', borderWidth: 1.5, type: 'line', tension: 0.2, pointRadius: 0, order: 2 },
        { label: 'Signal', data: stock.signal_line, borderColor: upColor, backgroundColor: 'transparent', borderWidth: 1.5, type: 'line', tension: 0.2, pointRadius: 0, order: 2 },
        { label: 'Hist', data: stock.hist, backgroundColor: histColors, borderWidth: 0, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      height: chartH * 0.22,
      scales: { x: { ticks: { color:'#888', maxTicksLimit: 8, maxRotation: 0, font:{size:9} }, grid:{display:false} }, y: { ticks:{color:'#888',font:{size:9}}, grid:{color:'rgba(255,255,255,0.05)'} } },
      plugins: { legend: { display: false }, tooltip: { mode:'index',intersect:false } }
    }
  });

  // --- Chart 5: KD ---
  var kdCtx = document.getElementById('chart-kd-' + stock.code);
  new Chart(kdCtx, {
    type: 'line',
    data: {
      labels: stock.kd_dates,
      datasets: [
        { label: 'K', data: stock.kd_k, borderColor: priceColor, backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, pointRadius: 0 },
        { label: 'D', data: stock.kd_d, borderColor: upColor, backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      height: chartH * 0.22,
      scales: { x: { ticks: { color:'#888', maxTicksLimit: 8, maxRotation: 0, font:{size:9} }, grid:{display:false} }, y: { min:0, max:100, ticks:{color:'#888',font:{size:9},stepSize:25}, grid:{color:'rgba(255,255,255,0.05)'} } },
      plugins: { legend: { display: false }, tooltip: { enabled: true } }
    }
  });
}

stocks.forEach(function(s) {
  var maShortCss = s.ma5 > s.price ? 'down' : 'up';
  var ma10Css = s.ma10 > s.ma20 ? 'up' : 'down';
  document.getElementById('stocks').innerHTML +=
  '<div class="stock-card" id="card-' + s.code + '">' +
    '<div class="stock-header">' +
      '<div><div class="stock-name">' + s.name + ' (' + s.code + ')</div>' +
      '<div class="ma-row">' +
        '<span class="ma-tag ' + maShortCss + '">MA5:' + s.ma5.toFixed(2) + '</span>' +
        '<span class="ma-tag ' + (s.ma5 > s.ma10 ? 'up' : 'down') + '">MA10:' + s.ma10.toFixed(2) + '</span>' +
        '<span class="ma-tag ' + ma10Css + '">MA20:' + s.ma20.toFixed(2) + '</span>' +
      '</div></div>' +
      '<div class="stock-price">$' + s.price.toFixed(2) + '</div>' +
    '</div>' +
    '<div class="grid">' +
      '<div class="indicator"><div class="indicator-label">RSI(14)</div><div class="indicator-value ' + (s.rsi > 70 ? 'red' : s.rsi < 40 ? 'green' : 'yellow') + '">' + s.rsi + '</div></div>' +
      '<div class="indicator"><div class="indicator-label">KD K</div><div class="indicator-value ' + (s.kd_k > 80 ? 'red' : s.kd_k < 20 ? 'green' : 'yellow') + '">' + s.kd_k + '</div></div>' +
      '<div class="indicator"><div class="indicator-label">KD D</div><div class="indicator-value ' + (s.kd_d > 80 ? 'red' : s.kd_d < 20 ? 'green' : 'yellow') + '">' + s.kd_d + '</div></div>' +
      '<div class="indicator"><div class="indicator-label">MACD</div><div class="indicator-value ' + (s.macd > 0 ? 'green' : 'red') + '">' + (s.macd > 0 ? '+' : '') + s.macd + '</div></div>' +
      '<div class="indicator"><div class="indicator-label">Signal</div><div class="indicator-value ' + (s.macd_signal > 0 ? 'green' : 'red') + '">' + (s.macd_signal > 0 ? '+' : '') + s.macd_signal + '</div></div>' +
      '<div class="indicator"><div class="indicator-label">BB位置</div><div class="indicator-value ' + (s.bb_pos > 80 ? 'red' : s.bb_pos < 30 ? 'green' : 'yellow') + '">' + s.bb_pos + '%</div></div>' +
    '</div>' +
    '<span class="signal ' + signalClass[s.signal] + '">' + signalLabel[s.signal] + '</span>' +
    '<div class="conclusion">📝 ' + s.conclusion + '</div>' +
    '<div class="chart-wrap">' +
      '<canvas id="chart-price-' + s.code + '" style="margin-bottom:6px"></canvas>' +
      '<canvas id="chart-vol-' + s.code + '" style="margin-bottom:6px"></canvas>' +
      '<canvas id="chart-rsi-' + s.code + '" style="margin-bottom:6px"></canvas>' +
      '<canvas id="chart-macd-' + s.code + '" style="margin-bottom:6px"></canvas>' +
      '<canvas id="chart-kd-' + s.code + '"></canvas>' +
    '</div>' +
  '</div>';
});

// Draw all charts
stocks.forEach(function(s) { drawChart(s); });
</script>
</body>
</html>
