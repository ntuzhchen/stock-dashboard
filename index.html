<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stock Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 12px 0; }
h1 { font-size: 1.1rem; color: #4ecdc4; margin-bottom: 2px; padding: 0 14px; }
.updated { font-size: 0.65rem; color: #555; margin-bottom: 12px; padding: 0 14px; }
.stock-card { background: #1a1a2e; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; border: 1px solid #2d2d44; width: 100%; }
.stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.stock-name { font-size: 0.95rem; font-weight: 600; color: #fff; line-height: 1.3; }
.stock-price { font-size: 1.1rem; font-weight: 700; color: #4ecdc4; flex-shrink: 0; margin-left: 8px; }
.signal { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; font-weight: 600; margin-top: 6px; margin-right: 6px; }
.signal.buy { background: #1b4332; color: #26de81; }
.signal.sell { background: #4a1515; color: #fc5c65; }
.signal.hold { background: #3d3520; color: #ffd93d; }
.signal.caution { background: #4a3015; color: #f9ca24; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 8px 0; }
.indicator { background: #252540; border-radius: 8px; padding: 6px 3px; text-align: center; overflow: hidden; }
.indicator-label { font-size: 0.5rem; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }
.indicator-value { font-size: 0.8rem; font-weight: 600; margin-top: 2px; white-space: nowrap; }
.indicator-value.red { color: #fc5c65; }
.indicator-value.green { color: #26de81; }
.indicator-value.yellow { color: #ffd93d; }
.conclusion { background: #252540; border-radius: 8px; padding: 10px 12px; font-size: 0.68rem; line-height: 1.5; color: #ccc; margin-top: 8px; word-wrap: break-word; overflow-wrap: break-word; }
.conclusion b { color: #4ecdc4; font-size: 0.75rem; }
.ai-reason { display: block; color: #aaa; font-size: 0.62rem; margin-top: 4px; }
.ai-dir { display: block; color: #888; font-size: 0.6rem; margin-top: 2px; }
.chart-wrap { margin-top: 10px; }
.chart-img { width: 100%; border-radius: 8px; display: block; }
.ma-row { display: flex; gap: 4px; font-size: 0.62rem; margin-top: 3px; flex-wrap: wrap; }
.ma-tag { background: #252540; padding: 1px 5px; border-radius: 5px; }
.ma-tag.up { color: #26de81; }
.ma-tag.down { color: #fc5c65; }
.footer { text-align: center; padding: 14px; font-size: 0.6rem; color: #444; }
</style>
</head>
<body>
<h1>📊 Stock Dashboard</h1>
<p class="updated">Updated: <span id="updated-time"></span></p>
<div id="stocks"></div>
<div class="footer">MA + KD + RSI + MACD + Volume + Bollinger</div>
<script src="data.js"></script>
<script>
document.getElementById('updated-time').textContent=generatedAt;
var signalLabel={buy:"🟢 偏多",sell:"🔴 減碼",caution:"🟡 謹慎",hold:"⚪ 觀望"};
var signalClass={buy:"buy",sell:"sell",caution:"caution",hold:"hold"};
stocks.forEach(function(s){
  var maShortCss=s.ma5>s.price?'down':'up';
  document.getElementById('stocks').innerHTML+=
  '<div class="stock-card">'+
    '<div class="stock-header">'+
      '<div><div class="stock-name">'+s.name+' ('+s.code+')</div>'+
      '<div class="ma-row">'+
        '<span class="ma-tag '+maShortCss+'">MA5:'+s.ma5.toFixed(2)+'</span>'+
        '<span class="ma-tag '+(s.ma5>s.ma10?'up':'down')+'">MA10:'+s.ma10.toFixed(2)+'</span>'+
        '<span class="ma-tag '+(s.ma10>s.ma20?'up':'down')+'">MA20:'+s.ma20.toFixed(2)+'</span>'+
      '</div></div>'+
      '<div class="stock-price">$'+s.price.toFixed(2)+'</div>'+
    '</div>'+
    '<div class="grid">'+
      '<div class="indicator"><div class="indicator-label">RSI(14)</div><div class="indicator-value '+(s.rsi>70?'red':s.rsi<40?'green':'yellow')+'">'+s.rsi.toFixed(1)+'</div></div>'+
      '<div class="indicator"><div class="indicator-label">KD K</div><div class="indicator-value '+(s.kd_k>80?'red':s.kd_k<20?'green':'yellow')+'">'+s.kd_k.toFixed(1)+'</div></div>'+
      '<div class="indicator"><div class="indicator-label">KD D</div><div class="indicator-value '+(s.kd_d>80?'red':s.kd_d<20?'green':'yellow')+'">'+s.kd_d.toFixed(1)+'</div></div>'+
      '<div class="indicator"><div class="indicator-label">MACD</div><div class="indicator-value '+(s.macd>0?'green':'red')+'">'+(s.macd>0?'+':'')+s.macd.toFixed(2)+'</div></div>'+
      '<div class="indicator"><div class="indicator-label">Signal</div><div class="indicator-value '+(s.macd_signal>0?'green':'red')+'">'+(s.macd_signal>0?'+':'')+s.macd_signal.toFixed(2)+'</div></div>'+
      '<div class="indicator"><div class="indicator-label">BB位置</div><div class="indicator-value '+(s.bb_pos>80?'red':s.bb_pos<30?'green':'yellow')+'">'+s.bb_pos+'%</div></div>'+
    '</div>'+
    '<span class="signal '+signalClass[s.signal]+'">'+signalLabel[s.signal]+'</span>'+
    '<div class="conclusion">📝 <b>'+(s.ai_conclusion||s.conclusion||'—')+'</b><br>'+
    '<span class="ai-reason">⚙️ '+((s.ai_reason||'')||'').replace(/^⚙️ /,'') + '</span><br>'+
    '<span class="ai-dir">🔭 '+(s.ai_direction||'持續觀察')+'</span></div>'+
    '<div class="chart-wrap"><img class="chart-img" src="charts/'+s.code+'_'+s.name+'.png" alt="'+s.name+' chart" loading="lazy"></div>'+
  '</div>';
});
</script>
</body>
</html>
